<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Extracted Information</title>
    <!-- Include Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Flowbite CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.6.5/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6 text-center">Edit Extracted Information</h1>
        <form method="post" action="{{ url_for('save_data') }}" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-6">
            <!-- Header Information -->
            <h2 class="text-2xl font-semibold mb-4">Header Information</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="Meeting_Number">
                        Meeting Number:
                    </label>
                    <input type="text" name="Meeting_Number" id="Meeting_Number" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" value="{{ header_info['Meeting_Number'] }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="Committee_Name">
                        Committee Name:
                    </label>
                    <select name="Committee_Name" id="Committee_Name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                        {% for committee_option in ["Management", "Council", "Console", "Postgraduate"] %}
                        <option value="{{ committee_option }}" {% if header_info['Committee_Name'] == committee_option %}selected{% endif %}>
                            {{ committee_option }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="Date">
                        Date:
                    </label>
                    <input type="date" name="Date" id="Date" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" value="{{ header_info['Date'] }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="Time">
                        Time:
                    </label>
                    <input type="time" name="Time" id="Time" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" value="{{ header_info['Time'] }}" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="Location">
                        Location:
                    </label>
                    <input type="text" name="Location" id="Location" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" value="{{ header_info['Location'] }}" required>
                </div>
            </div>

            <!-- Minutes -->
            <h2 class="text-2xl font-semibold mt-8 mb-4">Minutes</h2>
            {% for minit_number, data in minit_summaries.items() %}
            <div class="bg-gray-50 border border-gray-200 rounded-lg p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-medium">{{ minit_number }}</h3>
                    <!-- Button to trigger modal -->
                    <button type="button" class="text-blue-500 hover:text-blue-700 focus:outline-none" data-modal-toggle="contentModal{{ loop.index }}">
                        View Full Content
                    </button>
                </div>
                <input type="hidden" name="minit_number[]" value="{{ minit_number }}">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="summary_{{ loop.index }}">
                        Summary:
                    </label>
                    <textarea name="summary[]" id="summary_{{ loop.index }}" rows="4" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>{{ data['summary'] }}</textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="tag_{{ loop.index }}">
                        Tag:
                    </label>
                    <select name="tag[]" id="tag_{{ loop.index }}" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                        {% for tag_option in tags %}
                        <option value="{{ tag_option }}" {% if data['tag'] == tag_option %}selected{% endif %}>{{ tag_option }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="impact_{{ loop.index }}">
                        Impact:
                    </label>
                    <select name="impact[]" id="impact_{{ loop.index }}" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                        {% for impact_option in impact_options %}
                        <option value="{{ impact_option }}" {% if data['impact'] == impact_option %}selected{% endif %}>{{ impact_option }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Modal for Full Content -->
            <div id="contentModal{{ loop.index }}" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-modal md:h-full">
              <div class="relative p-4 w-full max-w-3xl h-full md:h-auto">
                <!-- Modal content -->
                <div class="relative bg-white rounded-lg shadow dark:bg-gray-700">
                  <!-- Modal header -->
                  <div class="flex justify-between items-center p-5 rounded-t border-b dark:border-gray-600">
                    <h3 class="text-xl font-medium text-gray-900 dark:text-white">
                      {{ minit_number }} Full Content
                    </h3>
                    <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-toggle="contentModal{{ loop.index }}">
                      <svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                      </svg>
                      <span class="sr-only">Close modal</span>
                    </button>
                  </div>
                  <!-- Modal body -->
                  <div class="p-6 space-y-6">
                    <pre class="whitespace-pre-wrap text-gray-800">{{ data['content'] }}</pre>
                  </div>
                  <!-- Modal footer -->
                  <div class="flex items-center p-6 space-x-2 rounded-b border-t border-gray-200 dark:border-gray-600">
                    <button data-modal-toggle="contentModal{{ loop.index }}" type="button" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
                      Close
                    </button>
                  </div>
                </div>
              </div>
            </div>
            {% endfor %}
    
            <!-- Hidden Field for Filename -->
            <input type="hidden" name="filename" value="{{ filename }}">
    
            <!-- Save and Cancel Buttons -->
            <div class="flex justify-end space-x-4 mt-6">
                <button type="submit" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    Save
                </button>
                <a href="{{ url_for('upload_file') }}" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Include Alpine.js (dependency for Flowbite) -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- Include Flowbite JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.6.5/flowbite.min.js"></script>
</body>
</html>
